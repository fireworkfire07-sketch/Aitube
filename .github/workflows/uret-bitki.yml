name: Bitki Senaryo Uret

on:
  workflow_dispatch:

jobs:
  uret:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: FFmpeg kur
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: edge-tts kur
        run: pip install edge-tts

      - name: Senaryo uret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node uret-senaryo.mjs

      - name: Gorselleri uret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node gorsel-uret.mjs

      - name: Sesleri uret
        run: node ses-uret.mjs

      - name: Videoyu olustur
        run: node video-olustur.mjs

      - name: Sonuclari kaydet (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: bitki-cikti
          path: |
            senaryo.json
            video.mp4
          if-no-files-found: warn
          
      - name: googleapis kur
        run: npm install googleapis

      - name: YouTube'a yukle
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PRIVACY: ${{ secrets.YT_PRIVACY }}
        run: node youtube-yukle.mjs

