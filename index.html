<input id="prompt" placeholder="Video fikrini yaz..." style="width:300px; padding:10px;">
<br><br>

<button onclick="createVideo()">Video Oluştur</button>

<p id="result"></p>

<script>
async function createVideo() {
  const prompt = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  result.innerText = "Video talebi gönderiliyor...";

  const response = await fetch("/api/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt })
  });

  const data = await response.json();

  result.innerText = data.message + ": " + data.prompt;
}
</script>
