<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AiTube Studio</title>

  <style>
    body{
      margin:0;
      background:#050505;
      color:white;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:700px;
      background:#111;
      border-radius:24px;
      padding:30px;
      box-shadow:0 0 40px rgba(255,255,255,0.08);
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    p{
      color:#bbb;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:white;
      color:black;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    .result{
      margin-top:30px;
      background:#1b1b1b;
      border-radius:18px;
      padding:20px;
      line-height:1.7;
    }

    .title{
      font-size:28px;
      font-weight:bold;
      margin-bottom:15px;
      color:#00ffae;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>🎬 AiTube Studio</h1>

  <p>
    Otomatik YouTube Shorts fikir + senaryo üretici
  </p>

  <button onclick="generateVideo()">
    Yeni Viral Video Üret
  </button>

  <div class="result" id="result">

    Henüz video üretilmedi.

  </div>

</div>

<script>

const niches = [
  "Yoga Nefes Teknikleri",
  "Çocuk Hikayeleri",
  "AI ile Para Kazanma",
  "Mini Belgesel",
  "Motivasyon",
  "Sağlıklı Yaşam",
  "Uyku Meditasyonu",
  "Antalya Gezi Rehberi"
];

function generateVideo(){

  const niche =
    niches[Math.floor(Math.random()*niches.length)];

  const random =
    Math.floor(Math.random()*9999);

  const html = `

    <div class="title">
      ${niche} #${random}
    </div>

    <b>Hook:</b><br>
    İlk 3 saniyede dikkat çek:
    "${niche} hakkında çoğu kişinin bilmediği yöntem..."<br><br>

    <b>Senaryo:</b><br>
    Bugün ${niche} konusunda kısa ama viral olabilecek bir içerik hazırlıyoruz.
    Önce dikkat çekici giriş yapıyoruz.
    Sonra 3 hızlı bilgi veriyoruz.
    Finalde takip çağrısı yapıyoruz.<br><br>

    <b>Görsel Prompt:</b><br>
    cinematic, viral youtube shorts,
    vertical 9:16, ultra realistic,
    soft light, trending style<br><br>

    <b>Durum:</b><br>
    Yeni video üretildi ✅

  `;

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
