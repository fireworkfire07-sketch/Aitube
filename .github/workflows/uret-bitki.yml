name: Bitki ğSenaryo Uret

on:
  workflow_dispatch:

jobs:
  uret:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Senaryo uret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node uret-senaryo.mjs

      - name: Gorselleri uret
        env:
          POLLINATIONS_KEY: ${{ secrets.POLLINATIONS_KEY }}
        run: node gorsel-uret.mjs

      - name: Sonuclari kaydet (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: bitki-cikti
          path: |
            senaryo.json
            gorseller/
          if-no-files-found: warn
