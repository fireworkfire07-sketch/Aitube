<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AiTube Studio</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:radial-gradient(circle at top,#312e81,#020617 55%);
  color:white;
}
.app{max-width:980px;margin:auto;padding:18px}
.hero{
  padding:24px;
  border-radius:24px;
  background:linear-gradient(135deg,#111827,#1e1b4b);
  border:1px solid #4338ca;
  box-shadow:0 20px 60px #0008;
  margin-bottom:16px;
}
h1{margin:0;font-size:34px}
p{color:#cbd5e1}
.grid{display:grid;grid-template-columns:1fr;gap:14px}
.card{
  background:#0f172aee;
  border:1px solid #334155;
  border-radius:20px;
  padding:16px;
}
input,select,textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #475569;
  background:#020617;
  color:white;
  margin:7px 0;
  font-size:15px;
}
button{
  width:100%;
  border:0;
  padding:15px;
  border-radius:16px;
  margin-top:8px;
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
  color:white;
  font-weight:800;
  font-size:16px;
}
button.blue{background:linear-gradient(135deg,#2563eb,#06b6d4)}
button.green{background:linear-gradient(135deg,#16a34a,#22c55e)}
button.red{background:linear-gradient(135deg,#dc2626,#f97316)}
.output{
  background:#020617;
  border:1px solid #334155;
  border-radius:16px;
  padding:15px;
  white-space:pre-wrap;
  min-height:320px;
  line-height:1.45;
}
.badge{
  display:inline-block;
  padding:7px 11px;
  border-radius:999px;
  background:#312e81;
  margin:8px 5px 0 0;
  font-size:12px;
}
@media(min-width:800px){
  .grid{grid-template-columns:380px 1fr}
}
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <h1>AiTube Studio</h1>
    <p>Sesli konuşan, gerçek AI cevap veren anime kısa film ve viral içerik üretim paneli.</p>
    <span class="badge">OpenAI Bağlı</span>
    <span class="badge">Sesli Chat</span>
    <span class="badge">Anime Shorts</span>
    <span class="badge">Para Kazanma</span>
  </div>

  <div class="grid">

    <div class="card">
      <h2>AiTube Komut</h2>

      <textarea id="message" rows="6" placeholder="Örnek: Bana 30 saniyelik karanlık anime kısa film fikri üret. Başlık, senaryo, prompt ve hashtag ver."></textarea>

      <button onclick="askAI()">AI Cevap Üret</button>
      <button class="blue" onclick="startVoice()">Konuşarak Sor</button>
      <button class="green" onclick="speakResult()">Cevabı Sesli Oku</button>
      <button class="red" onclick="stopVoice()">Sesi Durdur</button>
      <button class="blue" onclick="copyResult()">Çıktıyı Kopyala</button>

      <h3>Hızlı Komutlar</h3>
      <button onclick="quick('Bugün paylaşmak için 3 viral anime kısa film fikri üret. Her biri için hook, senaryo ve hashtag ver.')">3 Viral Fikir</button>
      <button onclick="quick('AiTube için 30 saniyelik duygusal anime kısa film senaryosu yaz. Sahne sahne prompt ver.')">Anime Senaryo</button>
      <button onclick="quick('Bu hafta AiTube ile para kazanmak için uygulanabilir günlük plan çıkar.')">Para Planı</button>
    </div>

    <div class="card">
      <h2>AI Cevap</h2>
      <div id="out" class="output">Hazır. Yaz veya konuş.</div>
    </div>

  </div>
</div>

<script>
const out = document.getElementById("out");
const messageBox = document.getElementById("message");

async function askAI(){
  const message = messageBox.value.trim();

  if(!message){
    out.textContent = "Önce bir komut yaz veya konuş.";
    return;
  }

  out.textContent = "AiTube düşünüyor...";

  try{
    const res = await fetch("/api/generate", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ message })
    });

    const data = await res.json();

    if(!res.ok){
      out.textContent = "Hata: " + (data.error || "Bilinmeyen hata");
      return;
    }

    out.textContent = data.reply || "Cevap gelmedi.";
    speakText(data.reply);

  }catch(e){
    out.textContent = "Bağlantı hatası: " + e.message;
  }
}

function quick(text){
  messageBox.value = text;
  askAI();
}

function copyResult(){
  navigator.clipboard.writeText(out.textContent);
  alert("Kopyalandı");
}

function speakText(text){
  if(!text) return;
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "tr-TR";
  msg.rate = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function speakResult(){
  speakText(out.textContent);
}

function stopVoice(){
  speechSynthesis.cancel();
}

function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    out.textContent = "Bu tarayıcı sesli dinlemeyi desteklemiyor. Safari/Chrome dene.";
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "tr-TR";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  out.textContent = "Dinliyorum... Konuş.";

  recognition.start();

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    messageBox.value = text;
    askAI();
  };

  recognition.onerror = function(event){
    out.textContent = "Ses algılama hatası: " + event.error;
  };
}
</script>
</body>
</html>
