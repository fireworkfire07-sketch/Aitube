<!DOCTYPE html>
<html>
<head>
  <title>Aitube</title>
</head>
<body style="font-family: Arial; text-align:center; padding:50px;">

  <h1>Aitube AI Video</h1>

  <input id="prompt" placeholder="Video fikri yaz..." style="padding:10px; width:250px;" />
  
  <br><br>

  <button onclick="generate()" style="padding:10px 20px;">
    Video Oluştur
  </button>

  <p id="result"></p>

  <script>
    async function generate() {
      const prompt = document.getElementById("prompt").value;

      const res = await fetch("https://ai-backend-one-theta.vercel.app/api/brain", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      document.getElementById("result").innerText = JSON.stringify(data);
    }
  </script>

</body>
</html>
