<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AiTube Studio — AI YouTube İçerik Üreticisi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }
    header {
      background: #1a1a1a;
      border-bottom: 2px solid #ff0000;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.6rem; font-weight: 800; color: #ff0000; }
    header span { font-size: 0.85rem; color: #888; }
    .container { max-width: 800px; margin: 0 auto; padding: 32px 20px; }
    .input-section {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    input[type="text"], select {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1rem;
      padding: 12px 16px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus, select:focus { border-color: #ff0000; }
    select option { background: #1a1a1a; }
    .btn-row { display: flex; gap: 12px; }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: #ff0000; color: #fff; flex: 1; }
    .btn-primary:hover { background: #cc0000; }
    .btn-primary:disabled { background: #444; color: #888; cursor: not-allowed; }
    .btn-secondary { background: #222; color: #aaa; border: 1px solid #333; }
    .result-section {
      display: none;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .result-section.visible { display: block; }
    .result-section h3 {
      font-size: 0.85rem;
      color: #ff0000;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .result-text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #e0e0e0;
      white-space: pre-wrap;
    }
    .copy-btn {
      margin-top: 12px;
      background: #222;
      color: #ff0000;
      border: 1px solid #ff0000;
      padding: 8px 16px;
      font-size: 0.8rem;
      border-radius: 8px;
      cursor: pointer;
    }
    .copy-btn:hover { background: #ff0000; color: #fff; }
    .loading-box {
      display: none;
      text-align: center;
      padding: 40px;
      color: #888;
    }
    .loading-box.visible { display: block; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top: 3px solid #ff0000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tags-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag {
      background: #222; border: 1px solid #333;
      color: #aaa; padding: 4px 12px;
      border-radius: 20px; font-size: 0.8rem;
    }
    .error-box {
      display: none;
      background: #2a1010;
      border: 1px solid #ff0000;
      border-radius: 10px;
      padding: 16px;
      color: #ff6666;
      margin-bottom: 16px;
    }
    .error-box.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>▶ AiTube Studio</h1>
    <span>AI Destekli YouTube İçerik Üreticisi</span>
  </header>
  <div class="container">
    <div class="input-section">
      <label>📌 Niche / Konu</label>
      <input type="text" id="nicheInput" placeholder="Örn: Kripto, Fitness, Motivasyon..." />
      <label>🌍 Dil</label>
      <select id="langSelect">
        <option value="Türkçe">Türkçe</option>
        <option value="İngilizce">İngilizce</option>
      </select>
      <label>🎯 İçerik Türü</label>
      <select id="typeSelect">
        <option value="shorts">YouTube Shorts (60 sn)</option>
        <option value="video">Normal Video (5-10 dk)</option>
      </select>
      <div class="btn-row">
        <button class="btn-primary" id="generateBtn" onclick="generateContent()">🚀 İçerik Üret</button>
        <button class="btn-secondary" onclick="clearAll()">🗑️ Temizle</button>
      </div>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div class="loading-box" id="loadingBox">
      <div class="spinner"></div>
      AI içerik üretiyor...
    </div>
    <div class="result-section" id="titleSection">
      <h3>🎬 Video Başlığı</h3>
      <div class="result-text" id="titleText"></div>
      <button class="copy-btn" onclick="copyText('titleText')">📋 Kopyala</button>
    </div>
    <div class="result-section" id="hookSection">
      <h3>⚡ Hook</h3>
      <div class="result-text" id="hookText"></div>
      <button class="copy-btn" onclick="copyText('hookText')">📋 Kopyala</button>
    </div>
    <div class="result-section" id="scriptSection">
      <h3>📝 Senaryo</h3>
      <div class="result-text" id="scriptText"></div>
      <button class="copy-btn" onclick="copyText('scriptText')">📋 Kopyala</button>
    </div>
    <div class="result-section" id="descSection">
      <h3>📄 Açıklama</h3>
      <div class="result-text" id="descText"></div>
      <button class="copy-btn" onclick="copyText('descText')">📋 Kopyala</button>
    </div>
    <div class="result-section" id="hashtagSection">
      <h3>🏷️ Hashtagler</h3>
      <div class="tags-row" id="hashtagText"></div>
      <button class="copy-btn" onclick="copyText('hashtagText')">📋 Kopyala</button>
    </div>
  </div>
  <script>
    async function generateContent() {
      const niche = document.getElementById("nicheInput").value.trim();
      const lang = document.getElementById("langSelect").value;
      const type = document.getElementById("typeSelect").value;
      if (!niche) { showError("Lütfen bir niche/konu girin!"); return; }
      hideAll();
      showLoading(true);
      document.getElementById("generateBtn").disabled = true;
      const typeLabel = type === "shorts" ? "YouTube Shorts (60 saniye)" : "Normal YouTube videosu (5-10 dakika)";
      const prompt = `Sen profesyonel bir YouTube içerik stratejistisin.
Niche: ${niche}
Dil: ${lang}
Tür: ${typeLabel}

BASLIK:
[Başlık buraya]

HOOK:
[Hook buraya]

SENARYO:
[Senaryo buraya]

ACIKLAMA:
[Açıklama buraya]

HASHTAGLER:
[#hashtag1 #hashtag2 ...]`;
      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Hata");
        parseAndShow(data.result || data.answer || "");
      } catch (error) {
        showError("Hata: " + error.message);
      } finally {
        showLoading(false);
        document.getElementById("generateBtn").disabled = false;
      }
    }
    function parseAndShow(text) {
      const title = extract(text, "BASLIK");
      const hook = extract(text, "HOOK");
      const script = extract(text, "SENARYO");
      const desc = extract(text, "ACIKLAMA");
      const hashtags = extract(text, "HASHTAGLER");
      if (title) { document.getElementById("titleText").innerText = title; document.getElementById("titleSection").classList.add("visible"); }
      if (hook) { document.getElementById("hookText").innerText = hook; document.getElementById("hookSection").classList.add("visible"); }
      if (script) { document.getElementById("scriptText").innerText = script; document.getElementById("scriptSection").classList.add("visible"); }
      if (desc) { document.getElementById("descText").innerText = desc; document.getElementById("descSection").classList.add("visible"); }
      if (hashtags) {
        const tags = hashtags.match(/#\w+/g) || [];
        document.getElementById("hashtagText").innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join("");
        document.getElementById("hashtagSection").classList.add("visible");
      }
      if (!title && !hook) { document.getElementById("scriptText").innerText = text; document.getElementById("scriptSection").classList.add("visible"); }
    }
    function extract(text, key) {
      const regex = new RegExp(key + ":\\s*([\\s\\S]*?)(?=\\n[A-ZÇĞİÖŞÜ]+:|$)", "i");
      const match = text.match(regex);
      return match ? match[1].trim() : "";
    }
    function copyText(id) {
      const el
